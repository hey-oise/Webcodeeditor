<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HTML | CSS | PLAYGROUND</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="topBar">
            <div class="titleBar">
                <p class="appName">HTML | CSS | PLAYGROUND</p>
                <p class="projectName">hello</p>
            </div>
            <div class="tabs">
                <button class="tab1" onclick="switchTabs('html')">
                    index.html
                </button>
                <button class="tab2" onclick="switchTabs('css')">
                    style.css
                </button>
                <button class="tab3" onclick="switchTabs('js')">main.js</button>
                <div class="remaining-space"></div>
            </div>
        </div>
        <div class="main">
            <textarea name="html" class="editor1">this is html</textarea>
            <textarea name="css" class="editor2">this is css</textarea>
            <textarea name="js" class="editor3">this is js</textarea>

            <button type="button" class="run-btn" onclick="runCode()">
                RUN
            </button>
            
            <div class="app-output"></div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
